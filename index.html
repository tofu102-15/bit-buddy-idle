<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bit Buddy Idle</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18202a;
      --muted: #596574;
      --paper: #f6f1e4;
      --case: #d9474f;
      --case-dark: #9a2634;
      --screen: #b9d58a;
      --screen-dark: #213620;
      --line: #2c3138;
      --blue: #306ca8;
      --teal: #2b8176;
      --yellow: #f0bd49;
      --shadow: rgba(24, 32, 42, .16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(24,32,42,.06) 1px, transparent 1px),
        linear-gradient(rgba(24,32,42,.06) 1px, transparent 1px),
        #f4d98b;
      background-size: 24px 24px;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: minmax(310px, 420px) minmax(280px, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .device {
      background: var(--case);
      border: 4px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 0 var(--case-dark), 0 30px 50px var(--shadow);
      padding: 18px;
      display: grid;
      gap: 14px;
      min-height: 680px;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff8dc;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0;
      font-size: 14px;
    }

    .speaker {
      display: grid;
      grid-template-columns: repeat(5, 8px);
      gap: 5px;
    }

    .speaker i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7d1f2b;
      border: 1px solid #621722;
    }

    .screen {
      background: var(--screen);
      border: 5px solid var(--line);
      border-radius: 6px;
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.18);
      min-height: 330px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, rgba(33,54,32,.08) 0 2px, transparent 2px 6px);
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .lcd-top,
    .lcd-bottom {
      z-index: 1;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--screen-dark);
      font-family: "Courier New", monospace;
      font-weight: 900;
      font-size: 13px;
    }

    .pet-stage {
      z-index: 1;
      position: relative;
      display: grid;
      place-items: end center;
      padding: 0 12px 28px;
      min-height: 230px;
    }

    .pet-svg {
      width: min(74%, 240px);
      aspect-ratio: 1;
      image-rendering: pixelated;
      filter: drop-shadow(8px 10px 0 rgba(33,54,32,.18));
      animation: bop 1.7s steps(2, end) infinite;
    }

    .poop {
      position: absolute;
      left: 34px;
      bottom: 30px;
      font-size: 28px;
      filter: grayscale(.5);
      opacity: 0;
      transform: translateY(8px);
      transition: .2s;
    }

    .poop.show {
      opacity: 1;
      transform: translateY(0);
    }

    .spark {
      position: absolute;
      right: 44px;
      top: 52px;
      color: var(--screen-dark);
      font-family: "Courier New", monospace;
      font-weight: 900;
      opacity: 0;
    }

    .spark.show {
      animation: pop .7s ease-out;
    }

    @keyframes bop {
      0%, 100% { transform: translateY(0) scaleX(1); }
      50% { transform: translateY(-5px) scaleX(.98); }
    }

    @keyframes pop {
      0% { opacity: 0; transform: translateY(8px) scale(.8); }
      35% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-16px) scale(1.2); }
    }

    .meters {
      display: grid;
      gap: 9px;
    }

    .meter {
      display: grid;
      grid-template-columns: 64px 1fr 38px;
      align-items: center;
      gap: 8px;
      color: #fff8dc;
      font-weight: 900;
      font-size: 13px;
    }

    .bar {
      height: 15px;
      background: #8d2431;
      border: 2px solid var(--line);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 50%;
      background: var(--yellow);
      transition: width .25s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    button {
      min-height: 48px;
      border: 3px solid var(--line);
      border-radius: 6px;
      background: #fff8dc;
      color: var(--ink);
      font: 900 14px/1 "Yu Gothic UI", "Meiryo", sans-serif;
      box-shadow: 0 5px 0 var(--line);
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 var(--line);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
    }

    .panel {
      background: var(--paper);
      border: 4px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 0 rgba(24,32,42,.16);
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    h1, h2, p { margin: 0; }

    h1 {
      font-size: clamp(28px, 5vw, 54px);
      line-height: .95;
      letter-spacing: 0;
    }

    h2 {
      font-size: 18px;
      letter-spacing: 0;
    }

    .summary {
      color: var(--muted);
      line-height: 1.65;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 3px solid var(--line);
      background: #fffdf5;
      border-radius: 6px;
      padding: 10px;
      min-height: 74px;
      display: grid;
      gap: 4px;
    }

    .stat b {
      font-size: 22px;
      color: var(--blue);
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .log {
      border: 3px solid var(--line);
      background: #fffdf5;
      border-radius: 6px;
      padding: 10px;
      min-height: 154px;
      max-height: 210px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.55;
      color: #2f3844;
    }

    .log p + p { margin-top: 7px; }

    .evo-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-top: 2px dashed rgba(24,32,42,.28);
      padding-top: 12px;
    }

    .evo-row button {
      min-width: 110px;
      background: #d7ecff;
    }

    .save-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .save-row button {
      min-height: 42px;
      flex: 1 1 130px;
      background: #e8f2cc;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      background: var(--ink);
      color: #fff8dc;
      border: 3px solid #fff8dc;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 900;
      transition: .2s;
      pointer-events: none;
      max-width: min(92vw, 460px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 820px) {
      body { padding: 12px; }
      main { grid-template-columns: 1fr; }
      .device { min-height: auto; }
      .screen { min-height: 300px; }
      .grid { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 34px; }
    }

    @media (max-width: 420px) {
      .controls,
      .grid { grid-template-columns: 1fr; }
      .meter { grid-template-columns: 58px 1fr 34px; }
      button { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="device" aria-label="育成端末">
      <div class="brand">
        <span>Bit Buddy</span>
        <span class="speaker" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
      </div>

      <div class="screen">
        <div class="lcd-top">
          <span id="petName">MAME-01</span>
          <span id="clock">00:00</span>
        </div>
        <div class="pet-stage">
          <svg id="petSvg" class="pet-svg" viewBox="0 0 160 160" role="img" aria-label="育成モンスター"></svg>
          <div id="poop" class="poop" aria-hidden="true">■</div>
          <div id="spark" class="spark">+1</div>
        </div>
        <div class="lcd-bottom">
          <span id="moodText">きげん: ふつう</span>
          <span id="ageText">0日目</span>
        </div>
      </div>

      <div class="meters">
        <div class="meter"><span>まんぷく</span><div class="bar"><span id="hungerBar"></span></div><span id="hungerVal">50</span></div>
        <div class="meter"><span>きげん</span><div class="bar"><span id="happyBar"></span></div><span id="happyVal">50</span></div>
        <div class="meter"><span>元気</span><div class="bar"><span id="energyBar"></span></div><span id="energyVal">50</span></div>
        <div class="meter"><span>清潔</span><div class="bar"><span id="cleanBar"></span></div><span id="cleanVal">50</span></div>
      </div>

      <div class="controls">
        <button id="feedBtn" title="食事">● ごはん</button>
        <button id="playBtn" title="遊ぶ">◆ あそぶ</button>
        <button id="trainBtn" title="訓練">▲ くんれん</button>
        <button id="cleanBtn" title="掃除">✚ そうじ</button>
      </div>
    </section>

    <section class="panel">
      <div>
        <h1>ポケット育成アイドル</h1>
        <p class="summary">ブラウザを閉じていても時間経過を計算します。世話を焼きすぎても放置しすぎても成長が変わる、携帯育成機風の小さなゲームです。</p>
      </div>

      <div class="grid">
        <div class="stat"><span>エネルギービット</span><b id="bits">0</b></div>
        <div class="stat"><span>毎秒生産</span><b id="rate">0.0</b></div>
        <div class="stat"><span>訓練値</span><b id="power">0</b></div>
        <div class="stat"><span>世話ミス</span><b id="misses">0</b></div>
      </div>

      <div class="evo-row">
        <div>
          <h2 id="stageName">幼体</h2>
          <p class="summary" id="evoHint">ビット30、訓練5、きげん40以上で進化できます。</p>
        </div>
        <button id="evolveBtn">進化</button>
      </div>

      <div>
        <h2>ログ</h2>
        <div class="log" id="log" aria-live="polite"></div>
      </div>

      <div class="save-row">
        <button id="saveBtn">保存</button>
        <button id="resetBtn">最初から</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const SAVE_KEY = "bit-buddy-idle-v1";
    const stages = [
      { name: "幼体", pet: "MAME-01", minBits: 30, minPower: 5, rate: .35, color: "#213620", accent: "#4d6b33" },
      { name: "成長期", pet: "KORO-12", minBits: 140, minPower: 24, rate: .9, color: "#1e3f68", accent: "#2b8176" },
      { name: "成熟期", pet: "GIGA-70", minBits: 600, minPower: 90, rate: 2.1, color: "#41265f", accent: "#d9474f" },
      { name: "完全体", pet: "OMEGA-99", minBits: Infinity, minPower: Infinity, rate: 4.4, color: "#202735", accent: "#f0bd49" }
    ];

    const state = {
      bits: 0,
      hunger: 66,
      happy: 58,
      energy: 70,
      clean: 80,
      power: 0,
      misses: 0,
      stage: 0,
      bornAt: Date.now(),
      lastTick: Date.now(),
      log: ["たまごから小さなデータ生命体が生まれた。"]
    };

    const $ = (id) => document.getElementById(id);
    const clamp = (value, min = 0, max = 100) => Math.max(min, Math.min(max, value));
    const fmt = (num) => Math.floor(num).toLocaleString("ja-JP");

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
        if (!saved) return;
        Object.assign(state, saved);
        state.log = Array.isArray(saved.log) ? saved.log.slice(-8) : state.log;
        applyOfflineProgress();
      } catch {
        addLog("セーブデータの読み込みに失敗したので、新しい育成を始めます。");
      }
    }

    function save(show = false) {
      state.lastTick = Date.now();
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      if (show) toast("保存しました");
    }

    function applyOfflineProgress() {
      const now = Date.now();
      const elapsed = Math.max(0, (now - state.lastTick) / 1000);
      if (elapsed < 3) return;
      const capped = Math.min(elapsed, 60 * 60 * 8);
      tick(capped, true);
      addLog(`${Math.floor(capped / 60)}分ぶんの放置成長を受け取りました。`);
      state.lastTick = now;
    }

    function rate() {
      const care = (state.hunger + state.happy + state.energy + state.clean) / 400;
      const missPenalty = Math.max(.25, 1 - state.misses * .025);
      return stages[state.stage].rate * (.45 + care) * missPenalty;
    }

    function tick(seconds, offline = false) {
      state.bits += rate() * seconds;
      state.hunger = clamp(state.hunger - seconds * .22);
      state.happy = clamp(state.happy - seconds * .12);
      state.energy = clamp(state.energy + seconds * .08);
      state.clean = clamp(state.clean - seconds * .08);

      if (!offline && Math.random() < seconds * .012) {
        state.clean = clamp(state.clean - 14);
        addLog("床がよごれた。掃除すると調子が戻ります。");
      }

      const bad = [state.hunger, state.happy, state.clean].some(v => v <= 3);
      if (bad && Math.random() < seconds * .02) {
        state.misses += 1;
        state.happy = clamp(state.happy + 8);
        addLog("世話ミス。少しすねています。");
      }
    }

    function addLog(text) {
      state.log.unshift(text);
      state.log = state.log.slice(0, 8);
    }

    function toast(text) {
      const el = $("toast");
      el.textContent = text;
      el.classList.add("show");
      window.clearTimeout(toast.timer);
      toast.timer = window.setTimeout(() => el.classList.remove("show"), 1400);
    }

    function action(kind) {
      if (kind === "feed") {
        state.hunger = clamp(state.hunger + 24);
        state.clean = clamp(state.clean - 5);
        addLog("ごはんを食べた。まんぷくが上がった。");
        pop("+ごはん");
      }
      if (kind === "play") {
        state.happy = clamp(state.happy + 20);
        state.energy = clamp(state.energy - 8);
        state.bits += 3 + state.stage;
        addLog("一緒に遊んだ。少しビットも見つけた。");
        pop("+3");
      }
      if (kind === "train") {
        if (state.energy < 12) {
          toast("元気が足りません");
          return;
        }
        state.power += 1 + state.stage;
        state.energy = clamp(state.energy - 16);
        state.happy = clamp(state.happy - 3);
        state.bits += 8 + state.stage * 4;
        addLog("訓練成功。訓練値とビットが増えた。");
        pop("+訓練");
      }
      if (kind === "clean") {
        state.clean = 100;
        state.happy = clamp(state.happy + 5);
        addLog("すっきり掃除した。");
        pop("OK");
      }
      render();
      save();
    }

    function evolve() {
      const next = stages[state.stage + 1];
      if (!next) {
        toast("これ以上はまだ進化しません");
        return;
      }
      const can = state.bits >= next.minBits && state.power >= next.minPower && state.happy >= 40;
      if (!can) {
        toast("進化条件が足りません");
        return;
      }
      state.bits -= next.minBits;
      state.stage += 1;
      state.hunger = clamp(state.hunger + 18);
      state.happy = clamp(state.happy + 18);
      state.energy = 100;
      addLog(`${next.pet} に進化した。`);
      pop("EVOLVE");
      render();
      save();
    }

    function resetGame() {
      if (!confirm("セーブデータを消して最初から始めますか？")) return;
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    }

    function pop(text) {
      const el = $("spark");
      el.textContent = text;
      el.classList.remove("show");
      void el.offsetWidth;
      el.classList.add("show");
    }

    function petSvg(stage) {
      const s = stages[stage];
      const horn = stage >= 1 ? `<rect x="70" y="24" width="20" height="18" fill="${s.accent}"/><rect x="76" y="14" width="8" height="12" fill="${s.accent}"/>` : "";
      const wings = stage >= 2 ? `<rect x="18" y="70" width="30" height="34" fill="${s.accent}"/><rect x="112" y="70" width="30" height="34" fill="${s.accent}"/>` : "";
      const crown = stage >= 3 ? `<rect x="54" y="20" width="52" height="12" fill="#f0bd49"/><rect x="62" y="10" width="10" height="16" fill="#f0bd49"/><rect x="88" y="10" width="10" height="16" fill="#f0bd49"/>` : "";
      return `
        ${wings}${horn}${crown}
        <rect x="44" y="48" width="72" height="72" fill="${s.color}"/>
        <rect x="36" y="64" width="16" height="32" fill="${s.color}"/>
        <rect x="108" y="64" width="16" height="32" fill="${s.color}"/>
        <rect x="56" y="38" width="48" height="18" fill="${s.color}"/>
        <rect x="58" y="70" width="12" height="12" fill="#f6f1e4"/>
        <rect x="90" y="70" width="12" height="12" fill="#f6f1e4"/>
        <rect x="62" y="74" width="8" height="8" fill="#18202a"/>
        <rect x="90" y="74" width="8" height="8" fill="#18202a"/>
        <rect x="70" y="96" width="20" height="8" fill="${s.accent}"/>
        <rect x="52" y="120" width="18" height="16" fill="${s.color}"/>
        <rect x="90" y="120" width="18" height="16" fill="${s.color}"/>
        <rect x="46" y="136" width="26" height="8" fill="${s.color}"/>
        <rect x="88" y="136" width="26" height="8" fill="${s.color}"/>
      `;
    }

    function mood() {
      const avg = (state.hunger + state.happy + state.energy + state.clean) / 4;
      if (avg > 78) return "さいこう";
      if (avg > 52) return "ふつう";
      if (avg > 25) return "しょんぼり";
      return "ピンチ";
    }

    function render() {
      const current = stages[state.stage];
      const next = stages[state.stage + 1];
      $("petName").textContent = current.pet;
      $("clock").textContent = new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
      $("ageText").textContent = `${Math.floor((Date.now() - state.bornAt) / 86400000)}日目`;
      $("moodText").textContent = `きげん: ${mood()}`;
      $("petSvg").innerHTML = petSvg(state.stage);
      $("poop").classList.toggle("show", state.clean < 35);

      [["hunger", state.hunger], ["happy", state.happy], ["energy", state.energy], ["clean", state.clean]].forEach(([key, value]) => {
        $(`${key}Bar`).style.width = `${clamp(value)}%`;
        $(`${key}Val`).textContent = Math.round(value);
      });

      $("bits").textContent = fmt(state.bits);
      $("rate").textContent = rate().toFixed(1);
      $("power").textContent = fmt(state.power);
      $("misses").textContent = state.misses;
      $("stageName").textContent = current.name;
      $("log").innerHTML = state.log.map(item => `<p>${item}</p>`).join("");

      if (next) {
        $("evoHint").textContent = `ビット${fmt(next.minBits)}、訓練${fmt(next.minPower)}、きげん40以上で ${next.name} に進化できます。`;
        $("evolveBtn").disabled = !(state.bits >= next.minBits && state.power >= next.minPower && state.happy >= 40);
      } else {
        $("evoHint").textContent = "現在のバージョンで到達できる最終進化です。放置収入を伸ばして記録を狙えます。";
        $("evolveBtn").disabled = true;
      }
    }

    $("feedBtn").addEventListener("click", () => action("feed"));
    $("playBtn").addEventListener("click", () => action("play"));
    $("trainBtn").addEventListener("click", () => action("train"));
    $("cleanBtn").addEventListener("click", () => action("clean"));
    $("evolveBtn").addEventListener("click", evolve);
    $("saveBtn").addEventListener("click", () => save(true));
    $("resetBtn").addEventListener("click", resetGame);

    load();
    render();
    window.setInterval(() => {
      const now = Date.now();
      const seconds = Math.min(10, (now - state.lastTick) / 1000);
      state.lastTick = now;
      tick(seconds);
      render();
    }, 1000);
    window.setInterval(() => save(), 15000);
  </script>
</body>
</html>
